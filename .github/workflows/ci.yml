name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --ignore-scripts
        # --ignore-scripts: Camoufox-Binaries (200MB) nur bei Bedarf

      - name: Check formatting
        run: bunx prettier --check "src/**/*.ts"

      - name: Type check
        run: bun run build

      - name: Run tests
        run: bun run test
        # Placeholder — wird grün, sobald Tests existieren
