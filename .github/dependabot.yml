version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Zurich"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    labels:
      - "dependencies"
    open-pull-requests-limit: 10
    versioning-strategy: increase
    groups:
      crawlee:
        patterns:
          - "crawlee"
          - "@crawlee/*"
        update-types:
          - "minor"
          - "patch"
      playwright:
        patterns:
          - "playwright"
          - "camoufox-js"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Zurich"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
